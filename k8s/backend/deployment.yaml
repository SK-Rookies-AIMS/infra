apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aims-project
  labels:
    app: backend

spec:
  replicas: 2
  revisionHistoryLimit: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      serviceAccountName: backend
      containers:
        - name: backend
          image: 858507113889.dkr.ecr.ap-northeast-2.amazonaws.com/aims/backend:dev
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8081

          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-rds-secret

          readinessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi