apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service-api
  namespace: aims-project
  labels:
    app: ai-service-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ai-service-api
  template:
    metadata:
      labels:
        app: ai-service-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ai-service-api
          image: 858507113889.dkr.ecr.ap-northeast-2.amazonaws.com/aims/ai-service:dev
          imagePullPolicy: Always

          workingDir: /app

          command:
            - python
            - -m
            - uvicorn

          args:
            - app.main:app
            - --reload
            - --host
            - 0.0.0.0
            - --port
            - "8000"

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: ai-service-config
            - secretRef:
                name: ai-service-secret
                optional: true

          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi