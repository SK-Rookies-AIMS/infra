apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: platform
spec:
  type: ClusterIP
  selector:
    app: kibana
  ports:
    - name: http
      port: 5601
      targetPort: 5601
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      enableServiceLinks: false
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.17.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5601
          env:
            - name: SERVER_HOST
              value: 0.0.0.0
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch.platform.svc.cluster.local:9200
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 5601
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 6
