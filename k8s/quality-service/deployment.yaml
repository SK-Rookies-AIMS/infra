apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-service
  namespace: aims-project
  labels:
    app: quality-service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: quality-service
  template:
    metadata:
      labels:
        app: quality-service
    spec:
      containers:
        - name: quality-service
          image: 858507113889.dkr.ecr.ap-northeast-2.amazonaws.com/aims/quality-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          envFrom:
            - configMapRef:
                name: quality-service-config
            - secretRef:
                name: quality-service-runtime-secret
                optional: true
          startupProbe:
            httpGet:
              path: /api/quality/health
              port: 8083
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/quality/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/quality/health
              port: 8083
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
