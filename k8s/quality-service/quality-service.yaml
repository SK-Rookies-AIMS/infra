apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-service
  namespace: aims-project
spec:
  replicas: 2

  selector:
    matchLabels:
      app: quality-service

  template:
    metadata:
      labels:
        app: quality-service

    spec:
      containers:
        - name: quality-service
          image: 858507113889.dkr.ecr.ap-northeast-2.amazonaws.com/aims/quality-service:dev-60ac8eb59116
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8083

          env:
            - name: APP_NAME
              value: quality-service

            - name: SPRING_PROFILES_ACTIVE
              value: dev

            - name: SERVER_PORT
              value: "8083"

            - name: MANAGEMENT_ENDPOINTS_WEB_BASE_PATH
              value: /api/quality

            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: health

            - name: MANAGEMENT_HEALTH_REDIS_ENABLED
              value: "false"

            - name: KAFKA_GROUP_ID
              value: quality-dev

            - name: LOG_PATH
              value: /tmp/logs/dev

          envFrom:
            - secretRef:
                name: quality-service-runtime-secret

          startupProbe:
            httpGet:
              path: /api/quality/health
              port: 8083
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /api/quality/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /api/quality/health
              port: 8083
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: quality-service
  namespace: aims-project
spec:
  type: ClusterIP

  selector:
    app: quality-service

  ports:
    - name: http
      port: 8083
      targetPort: 8083