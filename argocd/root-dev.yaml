apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aims-dev-root
  namespace: platform
spec:
  project: default

  source:
    repoURL: https://github.com/SK-Rookies-AIMS/infra.git
    targetRevision: dev
    path: argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: platform

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true